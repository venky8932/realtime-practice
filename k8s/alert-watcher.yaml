apiVersion: v1
kind: ServiceAccount
metadata:
  name: alert-watcher-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alert-watcher-role
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alert-watcher-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: alert-watcher-sa
    namespace: default
roleRef:
  kind: Role
  name: alert-watcher-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-watcher
  labels:
    app: alert-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-watcher
  template:
    metadata:
      labels:
        app: alert-watcher
    spec:
      serviceAccountName: alert-watcher-sa
      containers:
        - name: alert-watcher
          image: alert-watcher-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: NAMESPACE
              value: "default"
            - name: WATCH_DEPLOYMENTS
              value: "fastapi,nodejs"
            - name: SMTP_HOST
              value: "smtp.example.com"
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USER
              value: "user@example.com"
            - name: SMTP_PASSWORD
              value: "password"
            - name: ALERT_TO
              value: "alerts@example.com"
            - name: ALERT_FROM
              value: "alerts@example.com"
